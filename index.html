<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YouTube Smart Remote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="remote-controller" id="remoteScreen">

    <!-- HEADER -->
    <header class="header">
        <div class="logo-section">
            <span class="yt-logo">🎬</span>
            <span class="yt-text">YouTube Remote</span>
        </div>
    </header>

    <!-- ZOEKBALK -->
    <div class="search-container">
        <input type="text" class="search-bar" id="searchInput" placeholder="Zoek op YouTube..." autocomplete="off">
        <span class="search-icon">🔍</span>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- D-PAD NAVIGATIE -->
    <div class="dpad-section">
        <div class="dpad-container">
            <button class="dpad-btn dpad-up" id="dpadUp" title="Omhoog">▲</button>
            <button class="dpad-btn dpad-down" id="dpadDown" title="Omlaag">▼</button>
            <button class="dpad-btn dpad-left" id="dpadLeft" title="Links">◀</button>
            <button class="dpad-btn dpad-right" id="dpadRight" title="Rechts">▶</button>
            <button class="dpad-btn dpad-ok" id="dpadOk">OK</button>
        </div>
    </div>

    <!-- HOME KNOP -->
    <div class="nav-buttons">
        <button class="nav-btn" id="homeBtn">
            <span class="icon">⌂</span>
            Home
        </button>
    </div>

    <!-- MEDIA CONTROLS -->
    <div class="media-section">
        <div class="media-row">
            <button class="skip-btn" id="prevVideoBtn" title="Vorige Video">⏮</button>
            <button class="seek-btn" id="seekMinusBtn" title="-10s">10-</button>
            <button class="media-btn-primary" id="playPauseBtn">▶</button>
            <button class="seek-btn" id="seekPlusBtn" title="+10s">+10</button>
            <button class="skip-btn" id="nextVideoBtn" title="Volgende Video">⏭</button>
        </div>

        <div class="volume-section">
            <span class="volume-icon">🔇</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
            <span class="volume-icon">🔊</span>
            <span class="volume-value" id="volumeValue">100%</span>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
