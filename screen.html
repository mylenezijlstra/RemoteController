<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Screen — Remote Controller</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        #player {
            width: 100vw;
            height: 100vh;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            transition: opacity 0.5s;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .status {
            font-size: 24px;
            font-weight: 700;
            color: #ff0000;
            margin-bottom: 10px;
        }
        .info {
            font-size: 16px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay">
        <div class="status">YouTube Remote Screen</div>
        <div class="info">Klaar voor verbinding...</div>
    </div>

    <div id="player"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let player;
        const socket = io();
        const overlay = document.getElementById('overlay');

        // 1. YouTube API laden
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 2. Player initialiseren
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '', // Start leeg
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log('YouTube Player is klaar');
        }

        function onPlayerStateChange(event) {
            // Stuur status terug naar remote indien nodig
        }

        // 3. Socket commando's ontvangen
        socket.on('execute', (data) => {
            console.log('Ontvangen commando:', data);
            
            overlay.classList.add('hidden');

            switch(data.type) {
                case 'play':
                    if (data.value) {
                        player.loadVideoById(data.value);
                    } else {
                        player.playVideo();
                    }
                    break;
                case 'pause':
                    player.pauseVideo();
                    break;
                case 'stop':
                    player.stopVideo();
                    overlay.classList.remove('hidden');
                    break;
                case 'volume':
                    player.setVolume(data.value);
                    break;
                case 'seek':
                    const currentTime = player.getCurrentTime();
                    player.seekTo(currentTime + data.value, true);
                    break;
                case 'nav':
                    // Voor YouTube leun-stijl navigatie (niet direct via IFrame)
                    break;
                case 'fullscreen':
                    const iframe = document.getElementById('player');
                    if (iframe.requestFullscreen) iframe.requestFullscreen();
                    break;
            }
        });

        // Verbinding status
        socket.on('connect', () => {
             console.log('Verbonden met server');
             document.querySelector('.info').textContent = 'Verbonden! Gebruik de afstandsbediening op je telefoon.';
        });
    </script>
</body>
</html>
